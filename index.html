<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motul Verification</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system, Arial, sans-serif; background:#f5f5f5; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; overflow:hidden; }
.card { background:#fff; padding:30px 20px 25px; border-radius:12px; width:100%; max-width:340px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,0.08); position:relative; z-index:2; }

.logo { width:120px; height:auto; margin:0 auto 18px; display:block; border-radius:4px; }

.spinner { width:60px; height:60px; border:3px solid #e0e0e0; border-top:3px solid #28a745; border-radius:50%; margin:25px auto; animation:spin 0.6s linear infinite; }
@keyframes spin { 100%{ transform:rotate(360deg); } }

.icon-wrap { width:85px; height:85px; background:#28a745; border-radius:50%; margin:12px auto 15px; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 0 0 8px rgba(40,167,69,0.1); }
.icon-wrap.orange { background:#ff8800; box-shadow:0 0 0 8px rgba(255,136,0,0.1); }
.icon-wrap::before, .icon-wrap::after { 
  content:''; 
  position:absolute; 
  width:100%; 
  height:100%; 
  border-radius:50%; 
  border:2px solid #28a745; 
  animation:ripple 1.5s infinite; 
}
.icon-wrap::after { animation-delay:0.5s; }
.icon-wrap.orange::before, .icon-wrap.orange::after { border-color:#ff8800; }
@keyframes ripple { 0%{ transform:scale(1); opacity:0.6; } 100%{ transform:scale(1.5); opacity:0; } }
.icon { font-size:42px; color:#fff; font-weight:bold; position:relative; z-index:2; }

.title { font-size:18px; font-weight:600; color:#28a745; margin:5px 0 3px; }
.title.orange { color:#ff8800; }
.desc { font-size:12px; color:#777; margin-bottom:18px; line-height:1.4; }

.product-img { width:160px; margin:18px auto; display:block; }

.box { background:#fafafa; padding:14px 12px; border-radius:8px; text-align:left; margin-top:15px; }
.label { color:#999; font-size:11px; margin-top:6px; margin-bottom:2px; }
.value { font-weight:600; font-size:13px; color:#333; margin-bottom:6px; }

.line { height:3px; background:#28a745; margin-top:18px; border-radius:2px; }
.line.orange { background:#ff8800; }

.footer { margin-top:12px; font-size:11px; color:#999; line-height:1.5; }
.error { color:#dc3545; font-size:15px; font-weight:600; margin-top:20px; }
.hidden { display:none; }

.confetti { position:absolute; width:8px; height:8px; animation:fall 3s linear forwards; z-index:1; border-radius:2px; }
@keyframes fall { 0%{ transform:translateY(-100px) rotate(0deg); opacity:1; } 100%{ transform:translateY(100vh) rotate(720deg); opacity:0; } }
</style>
</head>
<body>
<div class="card" id="card">
  <!-- আপনার imgbb লাল MOTUL লোগো -->
  <img src="https://i.ibb.co.com/1GS7k85d/image.png" class="logo">
  
  <div id="loading">
    <div class="spinner"></div>
  </div>
  <div id="result" class="hidden"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzzzOeUHOh6nwZlbR7YttY3Ho2FhJOWGsPhsQXu50iEROm4DS-Epbbr28J-YkRYPiA/exec";

const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('code');
const loading = document.getElementById('loading');
const result = document.getElementById('result');

if (!code) {
  showError("No Serial Number Found");
} else {
  setTimeout(() => {
    fetch(API_URL + "?code=" + encodeURIComponent(code))
      .then(res => res.json())
      .then(data => showResult(data))
      .catch(err => showError("Connection Error"));
  }, 200);
}

function showResult(data) {
  loading.classList.add('hidden');
  result.classList.remove('hidden');

  if (!data.success) {
    showError(data.message);
    return;
  }

  const isVerified = data.verified;
  const iconClass = isVerified? '' : 'orange';
  const titleClass = isVerified? 'title' : 'title orange';
  const lineClass = isVerified? 'line' : 'line orange';
  const iconSymbol = isVerified? '✓' : '!';

  result.innerHTML = `
    <div class="icon-wrap ${iconClass}">
      <div class="icon">${iconSymbol}</div>
    </div>
    <div class="${titleClass}">${data.status}</div>
    <div class="desc">${data.message}</div>
    ${data.image? `<img class="product-img" src="${data.image}" onerror="this.style.display='none'">` : ''}
    <div class="box">
      <div class="label">Serial Number</div>
      <div class="value">${data.serial}</div>
      <div class="label">Product</div>
      <div class="value">${data.product}</div>
    </div>
    <div class="${lineClass}"></div>
    <div class="footer">${data.footer}</div>
  `;

  if (isVerified) {
    fireConfetti();
  }
}

function fireConfetti() {
  const colors = ['#ff0', '#0f0', '#00f', '#f0f', '#ff8800', '#28a745', '#ff0000', '#ff69b4'];
  for (let i = 0; i < 100; i++) {
    setTimeout(() => {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-20px';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }, i * 25);
  }
}

function showError(msg) {
  loading.classList.add('hidden');
  result.classList.remove('hidden');
  result.innerHTML = `<div class="error">${msg}</div>`;
}
</script>
</body>
</html>
