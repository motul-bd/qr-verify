<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motul Product Verification</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  font-family:Arial, sans-serif; 
  background:#f2f2f2; 
  display:flex; 
  justify-content:center; 
  align-items:center; 
  min-height:100vh;
  padding:20px;
}
.card { 
  background:#fff; 
  padding:25px 20px; 
  border-radius:18px; 
  width:100%; 
  max-width:420px; 
  text-align:center; 
  box-shadow:0 10px 30px rgba(0,0,0,0.12); 
}
.logo { 
  width:110px; 
  margin:0 auto 15px; 
  display:block; 
  object-fit:contain; 
}
h2 { font-size:24px; margin-bottom:10px; color:#333; }
.subtitle { font-size:14px; color:#666; margin-bottom:20px; }
input { 
  width:100%; 
  padding:14px; 
  border:2px solid #ddd; 
  border-radius:10px; 
  font-size:16px; 
  margin-bottom:15px;
  text-align:center;
}
input:focus { border-color:#28a745; outline:none; }
button { 
  width:100%; 
  padding:14px; 
  background:#28a745; 
  color:#fff; 
  border:none; 
  border-radius:10px; 
  font-size:16px; 
  font-weight:bold; 
  cursor:pointer;
  transition:0.2s;
}
button:hover { background:#218838; }
button:disabled { background:#ccc; cursor:not-allowed; }
.loader { 
  width:60px; 
  height:60px; 
  border:5px solid #eee; 
  border-top:5px solid #28a745; 
  border-radius:50%; 
  margin:20px auto; 
  animation:spin 0.6s linear infinite; 
  display:none;
}
@keyframes spin { 100%{ transform:rotate(360deg); } }
.result { display:none; margin-top:20px; }
.icon { 
  width:110px; 
  height:110px; 
  border-radius:50%; 
  margin:20px auto; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  font-size:50px; 
  color:#fff; 
  position:relative; 
}
.green { background:#28a745; }
.orange { background:#ff8800; }
.icon::before, .icon::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:4px solid rgba(0,0,0,0.1);
  animation:ripple 1.5s infinite;
}
.icon::after { animation-delay:0.6s; }
@keyframes ripple {
 0%{ transform:scale(1); opacity:0.6;}
 100%{ transform:scale(1.8); opacity:0;}
}
.title { font-size:24px; font-weight:bold; margin:10px 0; }
.desc { font-size:15px; color:#666; margin-bottom:15px; }
.product-img { 
  width:240px; 
  margin:20px auto; 
  display:block; 
  border-radius:10px;
}
.box { 
  background:#fafafa; 
  padding:15px; 
  border-radius:12px; 
  text-align:left; 
  margin-top:10px; 
}
.label { color:#777; font-size:13px; margin-top:8px; }
.value { font-weight:bold; font-size:15px; margin-bottom:8px; word-break:break-all; }
.footer { margin-top:15px; font-size:13px; color:#666; }
.line-green { height:4px; background:#28a745; border-radius:5px; margin-top:10px; }
.line-orange { height:4px; background:#ff8800; border-radius:5px; margin-top:10px; }
.error { color:red; font-size:16px; font-weight:bold; margin-top:15px; }
</style>
</head>
<body>
<div class="card">
  <img src="https://lh3.googleusercontent.com/d/15SgtM-ZQeOE8rLKShid8wtbBmBllDv" class="logo">
  <h2>Verify Your Product</h2>
  <div class="subtitle">Enter serial number to check authenticity</div>
  
  <input type="text" id="serialInput" placeholder="Enter Serial Number" autocomplete="off">
  <button id="verifyBtn">Verify Now</button>
  
  <div id="loader" class="loader"></div>
  <div id="result" class="result"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbww89j1aDlLbuyjG-U168NK3WHpT0qv_DWs-n5HRAzmhMxp-OH_gUPGNeJsuJstCwoz/exec";

const input = document.getElementById('serialInput');
const btn = document.getElementById('verifyBtn');
const loader = document.getElementById('loader');
const result = document.getElementById('result');

btn.onclick = async () => {
  const code = input.value.trim();
  if (!code) {
    alert("Please enter serial number");
    return;
  }

  btn.disabled = true;
  loader.style.display = 'block';
  result.style.display = 'none';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({code: code})
    });
    
    const data = await res.json();
    showResult(data);

  } catch (err) {
    result.innerHTML = `<div class="error">Connection Error. Try again.</div>`;
    result.style.display = 'block';
  } finally {
    loader.style.display = 'none';
    btn.disabled = false;
  }
};

function showResult(data) {
  if (!data.success) {
    result.innerHTML = `<div class="error">${data.message}</div>`;
    result.style.display = 'block';
    return;
  }

  const isVerified = data.verified;
  const iconClass = isVerified ? 'green' : 'orange';
  const icon = isVerified ? '✓' : '!';
  const lineClass = isVerified ? 'line-green' : 'line-orange';
  const titleColor = isVerified ? '#28a745' : '#ff8800';

  result.innerHTML = `
    <div class="icon ${iconClass}">${icon}</div>
    <div class="title" style="color:${titleColor};">${data.status}</div>
    <div class="desc">${data.message}</div>
    ${data.image ? `<img class="product-img" src="${data.image}">` : ''}
    <div class="box">
      <div class="label">Serial Number</div>
      <div class="value">${data.serial}</div>
      <div class="label">Product</div>
      <div class="value">${data.product}</div>
    </div>
    <div class="${lineClass}"></div>
    <div class="footer">${data.footer}</div>
  `;
  result.style.display = 'block';
}

// Enter চাপলে সাবমিট
input.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') btn.click();
});
</script>
</body>
</html>
