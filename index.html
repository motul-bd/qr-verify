<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Verify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }

    h2 {
      margin: 10px 0;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="card" id="card">
  <div class="icon">🔍</div>
  <h2>Verifying Product...</h2>
  <p>Please wait</p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxFOoUf5zBeCoew0FxXnGSR2mQQfisLaNxFhnrtN2OxojZFRwjpK6fmDl-xLN678a6w/exec";

const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");

const card = document.getElementById("card");

if (!code) {
  card.innerHTML = `
    <div class="icon error">❌</div>
    <h2>Invalid QR</h2>
    <p>No code found</p>
  `;
} else {

  fetch(API_URL + "?code=" + code)
    .then(res => res.json())
    .then(data => {

      if (data.status === "success") {
        card.innerHTML = `
          <div class="icon success">✅</div>
          <h2>Verified</h2>
          <p>${data.message}</p>
        `;
      } else {
        card.innerHTML = `
          <div class="icon error">❌</div>
          <h2>Not Valid</h2>
          <p>${data.message}</p>
        `;
      }

    })
    .catch(err => {
      card.innerHTML = `
        <div class="icon error">❌</div>
        <h2>Server Error</h2>
        <p>API not responding</p>
      `;
    });
}
</script>

</body>
</html>
