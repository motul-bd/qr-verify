<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MOTUL Verification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:25px 20px;
  border-radius:18px;
  width:95%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.top-logo{
  width:110px;
  margin-bottom:15px;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #eee;
  border-top:5px solid #28a745;
  border-radius:50%;
  margin:20px auto;
  animation:spin 0.6s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="card" id="box">
  <img src="https://lh3.googleusercontent.com/d/15SgtM-ZQeOE8rLKShidid8wtbBmBllDv" class="top-logo">

  <div id="loader" class="loader"></div>

  <div id="manual" style="display:none;">
    <input type="text" id="codeInput" placeholder="Enter Serial Number" style="width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;">
    <br><br>
    <button onclick="goVerify()" style="width:100%;padding:12px;border:none;border-radius:10px;background:#d60000;color:#fff;">Verify</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsxx8Y3GDcmrRXisxgA32RFcgFa22qk1VJAOwI55uYUM1N65Bjip-a0WDxufkb2tG5/exec";

// URL থেকে code নেওয়া
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

// যদি QR থেকে আসে
if(code){
  window.location.href = SCRIPT_URL + "?code=" + code;
}else{
  // না থাকলে manual input দেখাও
  document.getElementById("loader").style.display="none";
  document.getElementById("manual").style.display="block";
}

// manual verify
function goVerify(){
  const val = document.getElementById("codeInput").value.trim();
  if(val){
    window.location.href = SCRIPT_URL + "?code=" + val;
  }
}
</script>

</body>
</html>
