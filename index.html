<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Verify</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:25px 20px;
  border-radius:18px;
  width:95%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #eee;
  border-top:5px solid #28a745;
  border-radius:50%;
  margin:20px auto;
  animation:spin 0.6s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

.icon{
  width:110px;
  height:110px;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:#fff;
}

.green{ background:#28a745; }
.orange{ background:#ff8800; }

.title{
  font-size:24px;
  font-weight:bold;
}

.desc{
  font-size:15px;
  color:#666;
}

.product-img{
  width:240px;
  margin:20px auto;
}

.box{
  background:#fafafa;
  padding:15px;
  border-radius:12px;
  text-align:left;
  margin-top:10px;
}

.label{ color:#777; font-size:13px; }
.value{ font-weight:bold; margin-bottom:10px; }

.footer{
  margin-top:10px;
  font-size:13px;
  color:#666;
}
</style>

</head>

<body>

<div class="card">
  <div id="loader" class="loader"></div>
  <div id="content" style="display:none;"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyxTdwY-SQQHNGGkgxuRTz4ktvsYt6JKV86SEY5INsh6O28saOAe9dA1BM3BWZj06VM/exec";

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(!code){
  document.getElementById("loader").style.display="none";
  document.getElementById("content").innerHTML = "<h2>No Serial Found</h2>";
  document.getElementById("content").style.display="block";
}

fetch(API + "?code=" + code)
.then(res => res.text())
.then(html => {
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("content").innerHTML = html;
    document.getElementById("content").style.display="block";
  },800);
})
.catch(()=>{
  document.getElementById("loader").style.display="none";
  document.getElementById("content").innerHTML = "<h2 style='color:red;'>Server Error</h2>";
  document.getElementById("content").style.display="block";
});

</script>

</body>
</html>
