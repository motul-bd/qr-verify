<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motul Verification</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial; background:#f0f0f0; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; overflow:hidden; }
.card { background:#fff; padding:40px 25px; border-radius:16px; width:95%; max-width:380px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1); position:relative; z-index:2; }
.logo { width:90px; margin:0 auto 25px; display:block; }
.spinner { width:70px; height:70px; border:4px solid #e0e0e0; border-top:4px solid #28a745; border-radius:50%; margin:40px auto; animation:spin 0.8s linear infinite; }
@keyframes spin { 100%{ transform:rotate(360deg); } }
.icon-wrap { width:90px; height:90px; background:#28a745; border-radius:50%; margin:15px auto; display:flex; align-items:center; justify-content:center; }
.icon { font-size:50px; color:#fff; }
.title { font-size:20px; font-weight:bold; color:#28a745; margin:8px 0; }
.desc { font-size:13px; color:#666; margin-bottom:20px; }
.product-img { width:180px; margin:20px auto; display:block; }
.box { background:#f8f9fa; padding:15px; border-radius:8px; text-align:left; margin-top:15px; }
.label { color:#999; font-size:12px; margin-top:8px; }
.value { font-weight:bold; font-size:14px; margin-bottom:5px; }
.footer { margin-top:20px; font-size:12px; color:#888; }
.line { height:2px; background:#28a745; margin-top:15px; }
.error { color:#dc3545; font-size:16px; font-weight:bold; margin-top:40px; }
.orange { background:#ff8800 !important; }
.title.orange { color:#ff8800 !important; }
.line.orange { background:#ff8800 !important; }
.hidden { display:none; }
/* কনফেটি */
.confetti { position:absolute; width:10px; height:10px; background:#ff0; animation:fall 3s linear forwards; z-index:1; }
@keyframes fall { 0%{ transform:translateY(-100px) rotate(0deg); opacity:1; } 100%{ transform:translateY(100vh) rotate(720deg); opacity:0; } }
</style>
</head>
<body>
<div class="card" id="card">
  <img src="https://drive.google.com/uc?export=view&id=15SgtM-ZQeOE8rLKShid8wtbBmBllDv" class="logo" onerror="this.style.display='none'">
  
  <div id="loading">
    <div class="spinner"></div>
  </div>
  <div id="result" class="hidden"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzzzOeUHOh6nwZlbR7YttY3Ho2FhJOWGsPhsQXu50iEROm4DS-Epbbr28J-YkRYPiA/exec";

const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('code');
const loading = document.getElementById('loading');
const result = document.getElementById('result');

if (!code) {
  showError("No Serial Number Found");
} else {
  setTimeout(() => {
    fetch(API_URL + "?code=" + encodeURIComponent(code))
      .then(res => res.json())
      .then(data => showResult(data))
      .catch(err => showError("Connection Error"));
  }, 800);
}

function showResult(data) {
  loading.classList.add('hidden');
  result.classList.remove('hidden');

  if (!data.success) {
    showError(data.message);
    return;
  }

  const isVerified = data.verified;
  const iconClass = isVerified? '' : 'orange';
  const titleClass = isVerified? 'title' : 'title orange';
  const lineClass = isVerified? 'line' : 'line orange';

  result.innerHTML = `
    <div class="icon-wrap ${iconClass}">
      <div class="icon">${isVerified? '✓' : '!'}</div>
    </div>
    <div class="${titleClass}">${data.status}</div>
    <div class="desc">${data.message}</div>
    ${data.image? `<img class="product-img" src="${data.image}" onerror="this.style.display='none'">` : ''}
    <div class="box">
      <div class="label">Serial Number</div>
      <div class="value">${data.serial}</div>
      <div class="label">Product</div>
      <div class="value">${data.product}</div>
    </div>
    <div class="${lineClass}"></div>
    <div class="footer">${data.footer}</div>
  `;

  // প্রথমবার ভেরিফাই হলে আতশবাজি
  if (isVerified && data.message.includes("First time")) {
    fireConfetti();
  }
}

function fireConfetti() {
  const colors = ['#ff0', '#0f0', '#00f', '#f0f', '#ff8800', '#28a745'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }, i * 30);
  }
}

function showError(msg) {
  loading.classList.add('hidden');
  result.classList.remove('hidden');
  result.innerHTML = `<div class="error">${msg}</div>`;
}
</script>
</body>
</html>
