<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTUL Verification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* LOADING */
#loading{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.loading-logo{
  width:120px;
  animation:pulse 1.2s infinite;
}

.loader{
  width:50px;
  height:50px;
  border:5px solid #eee;
  border-top:5px solid red;
  border-radius:50%;
  margin-top:15px;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}
@keyframes pulse{50%{transform:scale(1.1);}}

/* CARD */
.card{
  background:#fff;
  padding:25px;
  border-radius:20px;
  width:95%;
  max-width:380px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.9);}
  to{opacity:1;}
}

/* ICON + RING */
.icon-wrap{
  position:relative;
  width:100px;height:100px;
  margin:auto;
}

.icon{
  width:80px;height:80px;
  border-radius:50%;
  color:#fff;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:absolute;
  top:10px;left:10px;
  z-index:2;
}

.ring{
  width:100%;
  height:100%;
  border-radius:50%;
  border:4px solid rgba(0,0,0,0.1);
  animation:spinRing 1.5s linear infinite;
}

.success .ring{border-top:4px solid #28a745;}
.used .ring{border-top:4px solid #ff8800;}
.invalid .ring{border-top:4px solid #dc3545;}

@keyframes spinRing{100%{transform:rotate(360deg);}}

/* TEXT */
.title{font-size:22px;font-weight:bold;margin-top:10px;}
.desc{font-size:14px;color:#555;}

.product-img{
  width:130px;
  margin:10px auto;
}

.box{
  background:#f5f5f5;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  text-align:left;
}

.footer{
  margin-top:10px;
  font-size:12px;
  color:#777;
  border-top:3px solid;
  padding-top:6px;
}

#result{display:none;}
</style>

</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <img src="https://i.ibb.co/8XKq8hM/motul-logo.png" class="loading-logo">
  <div class="loader"></div>
</div>

<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbygNlUzGG_AkbwOXaL5Ki2iL1edka6i45ochaXtJ4EsS3AMSUqSyqMfE9FrBZQSUzhe/exec";

const DEFAULT_IMAGE = "https://i.ibb.co/8XKq8hM/motul-oil.png";

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

function confetti(){
  for(let i=0;i<60;i++){
    let d=document.createElement("div");
    d.style.position="fixed";
    d.style.width="6px";
    d.style.height="6px";
    d.style.background="hsl("+Math.random()*360+",100%,50%)";
    d.style.top="50%";
    d.style.left="50%";
    document.body.appendChild(d);

    let angle=Math.random()*2*Math.PI;
    let power=Math.random()*10+5;

    let vx=Math.cos(angle)*power;
    let vy=Math.sin(angle)*power;

    let x=window.innerWidth/2;
    let y=window.innerHeight/2;

    let g=0.3;

    let anim=setInterval(()=>{
      x+=vx;
      y+=vy;
      vy+=g;
      vx*=0.97;

      d.style.left=x+"px";
      d.style.top=y+"px";

      if(y>window.innerHeight){
        clearInterval(anim);
        d.remove();
      }
    },20);
  }
}

function showResult(type,data={}){

let title="",desc="",icon="",color="",cls="";

if(type==="success"){
  title="Genuine Product";
  desc="Product is authentic";
  icon="✔";
  color="#28a745";
  cls="success";
  confetti();
}
else if(type==="used"){
  title="Already Verified";
  desc="This code already used";
  icon="!";
  color="#ff8800";
  cls="used";
}
else{
  title="Invalid Code";
  desc="Fake product";
  icon="✖";
  color="#dc3545";
  cls="invalid";
}

// ✅ IMAGE FIX (always show)
let img = data.image && data.image.startsWith("http")
  ? data.image
  : DEFAULT_IMAGE;

document.getElementById("result").innerHTML = `
<div class="card ${cls}">

<div class="icon-wrap">
  <div class="ring"></div>
  <div class="icon" style="background:${color}">${icon}</div>
</div>

<div class="title" style="color:${color}">${title}</div>
<div class="desc">${desc}</div>

<img src="${img}" class="product-img">

<div class="box">
<b>Code:</b> ${data.code || "-"}<br>
<b>Product:</b> ${data.product || "-"}
</div>

<div class="footer" style="border-color:${color}">
Verified by MOTUL
</div>

</div>
`;

document.getElementById("loading").style.display="none";
document.getElementById("result").style.display="block";
}

// 🚀 FAST LOAD
if(!code){
  showResult("invalid");
}else{

let start = Date.now();

fetch(API_URL + "?code=" + code + "&mode=api",{cache:"no-store"})
.then(res=>res.json())
.then(data=>{
  let delay = 400 - (Date.now()-start);
  setTimeout(()=>{
    showResult(data.status,data);
  }, delay>0?delay:0);
})
.catch(()=>{
  showResult("invalid");
});

}

</script>

</body>
</html>
