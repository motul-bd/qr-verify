<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTUL Verification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:25px 20px;
  border-radius:18px;
  width:95%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.top-logo{
  width:110px;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #eee;
  border-top:5px solid #28a745;
  border-radius:50%;
  margin:20px auto;
  animation:spin 0.6s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

.icon{
  width:110px;
  height:110px;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:#fff;
  position:relative;
}

.green{ background:#28a745; }
.orange{ background:#ff8800; }

.icon::before,
.icon::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:4px solid rgba(0,0,0,0.1);
  animation:ripple 1.5s infinite;
}

.icon::after{ animation-delay:0.6s; }

@keyframes ripple{
  0%{ transform:scale(1); opacity:0.6;}
  100%{ transform:scale(1.8); opacity:0;}
}

.product-img{
  width:220px;
  margin:15px auto;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.desc{
  color:#666;
}

.box{
  background:#fafafa;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

.footer{
  margin-top:10px;
  font-size:13px;
  color:#666;
}
</style>

</head>

<body>

<div class="card">

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Motul_logo.png" class="top-logo">

<div id="loader" class="loader"></div>
<div id="content" style="display:none;"></div>

</div>

<script>

// 👉 আপনার ডাটা এখানে বসাবেন
const DATA = [
  {code:"A101", product:"Motul Engine Oil", image:"https://i.ibb.co/xxxx/product.jpg"},
  {code:"A102", product:"Motul Gear Oil", image:"https://i.ibb.co/yyyy/product.jpg"}
];

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

const loader = document.getElementById("loader");
const content = document.getElementById("content");

setTimeout(()=>{

  loader.style.display="none";
  content.style.display="block";

  if(!code){
    content.innerHTML="<h2 style='color:red'>No Code Found</h2>";
    return;
  }

  const item = DATA.find(x => x.code === code);

  if(!item){
    content.innerHTML="<h2 style='color:red'>Invalid Code</h2>";
    return;
  }

  let used = localStorage.getItem(code);

  if(used){

    content.innerHTML = `
      <div class="icon orange">!</div>
      <div class="title" style="color:#ff8800;">Already Verified</div>
      <div class="desc">This code already used</div>

      <img class="product-img" src="${item.image}" onerror="this.style.display='none'">

      <div class="box">
        <b>Code:</b> ${code}<br>
        <b>Product:</b> ${item.product}
      </div>

      <div class="footer">Verified by MOTUL</div>
    `;

  } else {

    localStorage.setItem(code,"used");

    content.innerHTML = `
      <div class="icon green">✔</div>
      <div class="title" style="color:#28a745;">Genuine Product</div>
      <div class="desc">Product is authentic</div>

      <img class="product-img" src="${item.image}" onerror="this.style.display='none'">

      <div class="box">
        <b>Code:</b> ${code}<br>
        <b>Product:</b> ${item.product}
      </div>

      <div class="footer">Verified by MOTUL</div>
    `;

    confetti();
  }

},700);

// 🎉 animation
function confetti(){
  for(let i=0;i<50;i++){
    let d=document.createElement("div");
    d.style.position="fixed";
    d.style.width="8px";
    d.style.height="8px";
    d.style.background="hsl("+Math.random()*360+",100%,50%)";
    d.style.top="50%";
    d.style.left="50%";
    document.body.appendChild(d);

    let angle=Math.random()*2*Math.PI;
    let power=Math.random()*10+5;

    let vx=Math.cos(angle)*power;
    let vy=Math.sin(angle)*power;

    let x=window.innerWidth/2;
    let y=window.innerHeight/2;

    let g=0.25;

    let anim=setInterval(()=>{
      x+=vx;
      y+=vy;
      vy+=g;

      d.style.left=x+"px";
      d.style.top=y+"px";

      if(y>window.innerHeight){
        clearInterval(anim);
        d.remove();
      }
    },20);
  }
}

</script>

</body>
</html>
