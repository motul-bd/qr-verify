<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTUL Verification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:25px 20px;
  border-radius:18px;
  width:95%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.top-logo{
  width:110px;
  margin:0 auto 15px;
  display:block;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #eee;
  border-top:5px solid #28a745;
  border-radius:50%;
  margin:20px auto;
  animation:spin 0.6s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

.icon{
  width:110px;
  height:110px;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:#fff;
}

.green{ background:#28a745; }
.orange{ background:#ff8800; }

.title{
  font-size:24px;
  font-weight:bold;
}

.desc{
  font-size:15px;
  color:#666;
}

.product-img{
  width:240px;
  margin:20px auto;
}

.box{
  background:#fafafa;
  padding:15px;
  border-radius:12px;
  text-align:left;
  margin-top:10px;
}

.label{ color:#777; font-size:13px; }
.value{ font-weight:bold; margin-bottom:10px; }

.line{
  height:4px;
  border-radius:5px;
  margin-top:10px;
}
.green-line{ background:#28a745; }
.orange-line{ background:#ff8800; }

.footer{
  margin-top:10px;
  font-size:13px;
  color:#666;
}
</style>

</head>
<body>

<div class="card">
  <img src="https://drive.google.com/thumbnail?id=15SgtM-ZQeOE8rLKShidid8wtbBmBllDv&sz=w500" class="top-logo">

  <div id="loader" class="loader"></div>

  <div id="content" style="display:none;"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxGF_qUKRhEQOeQyAfLBrBJu4xorb8fiLmf65iGFlJzWgHz8xovs0KkBI8GH1ls4I02/exec";

// GET CODE FROM URL
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(!code){
  document.getElementById("loader").style.display="none";
  document.getElementById("content").innerHTML="<h2>No Serial Number</h2>";
  document.getElementById("content").style.display="block";
}else{

fetch(API + "?code=" + code)
.then(res => res.text())
.then(html => {
  document.open();
  document.write(html);
  document.close();
});
}
</script>

</body>
</html>
